const CATS = [
  {name:"Mouvement", start:0},
  {name:"Communication", start:50},
  {name:"Sentiment", start:100},
  {name:"Cognition", start:150},
  {name:"Action", start:200},
  {name:"Social", start:250},
  {name:"Existence", start:300}
];

let qs=[], score=0, answered=0;

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function el(tag, props, ...children){
  const e = document.createElement(tag);
  if(props){
    for(const k in props){
      if(k === 'class') e.className = props[k];
      else if(k === 'text') e.textContent = props[k];
      else if(k.startsWith('on')) e.addEventListener(k.slice(2), props[k]);
      else e.setAttribute(k, props[k]);
    }
  }
  children.flat().forEach(c => {
    if(c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function start(){
  const catVal = document.getElementById('catSel').value;
  const nb = parseInt(document.getElementById('nbSel').value);
  let pool;
  if(catVal===''){
    pool = ALL;
  } else {
    const c = CATS[parseInt(catVal)];
    pool = ALL.slice(c.start, c.start+50);
  }
  const picked = shuffle([...pool]).slice(0, Math.min(nb, pool.length));
  qs = picked.map(q => ({
    v:q[0], s:q[1], a:q[2], e:q[6],
    opts: shuffle([q[2],q[3],q[4],q[5]]),
    state: null
  }));
  score=0; answered=0;
  render();
}

function buildSentence(q){
  const wrap = el('div', {class:'sent'});
  const parts = q.s.split('___');
  wrap.appendChild(document.createTextNode(parts[0]));
  const blank = el('span', {class:'blank', text: q.state ? q.a : '        '});
  wrap.appendChild(blank);
  wrap.appendChild(document.createTextNode(parts[1] || ''));
  return wrap;
}

function buildFeedback(q){
  const ok = q.state === q.a;
  const fb = el('div', {class:'fb ' + (ok?'ok':'ko')});
  if(ok){
    fb.appendChild(document.createTextNode('✓ Correct. ' + q.e));
  } else {
    fb.appendChild(document.createTextNode('✗ Incorrect. Réponse : '));
    fb.appendChild(el('strong', {text: q.a}));
    fb.appendChild(document.createTextNode('. ' + q.e));
  }
  return fb;
}

function render(){
  const app = document.getElementById('app');
  while(app.firstChild) app.removeChild(app.firstChild);
  const total = qs.length;
  const pct = total ? (answered/total*100).toFixed(0) : 0;

  const bar = el('div', {class:'progress-bar'},
    el('div', {class:'progress-fill', style:'width:'+pct+'%'}));
  app.appendChild(bar);

  const sb = el('div', {class:'score-bar'},
    el('div', {class:'si'},
      el('span', {class:'sl', text:'Score'}),
      el('span', {class:'sv', text: score+'/'+total})),
    el('div', {class:'si'},
      el('span', {class:'sl', text:'Répondu'}),
      el('span', {class:'sv', text: answered+'/'+total})));
  app.appendChild(sb);

  if(answered===total && total>0){
    const p = Math.round(score/total*100);
    const msg = p>=80 ? 'Excellent, niveau B2 confirmé.'
              : p>=60 ? 'Bon niveau B1/B2. Continuez.'
                      : 'À retravailler. Relancez un quiz.';
    const replay = el('button', {class:'btn', onclick: start, text:'Rejouer'});
    app.appendChild(el('div', {class:'end'},
      el('div', {class:'es', text: score+'/'+total}),
      el('div', {class:'em', text: p+'% — '+msg}),
      replay));
    return;
  }

  qs.forEach((q, i) => {
    const card = el('div', {class:'card'});
    card.appendChild(el('div', {class:'qnum', text:'Question ' + (i+1) + ' / ' + total}));
    card.appendChild(buildSentence(q));
    const opts = el('div', {class:'opts'});
    q.opts.forEach(optTxt => {
      let cls = 'opt';
      if(q.state){
        if(optTxt === q.a) cls = 'opt ok';
        else if(optTxt === q.state && q.state !== q.a) cls = 'opt ko';
      }
      const btn = el('button', {class:cls, text: optTxt, onclick: () => ans(i, optTxt)});
      if(q.state) btn.disabled = true;
      opts.appendChild(btn);
    });
    card.appendChild(opts);
    if(q.state){
      card.appendChild(buildFeedback(q));
      card.appendChild(el('div', {class:'vtag', text:'Verbe : ' + q.v}));
    }
    app.appendChild(card);
  });
}

function ans(i, opt){
  const q = qs[i];
  if(q.state) return;
  q.state = opt;
  if(opt === q.a) score++;
  answered++;
  render();
  const cards = document.querySelectorAll('.card');
  if(i+1 < cards.length) cards[i+1].scrollIntoView({behavior:'smooth', block:'center'});
}

function home(){
  const app = document.getElementById('app');
  while(app.firstChild) app.removeChild(app.firstChild);
  app.appendChild(el('div', {class:'home', text:'Appuyez sur "Nouveau quiz" pour commencer.'}));
}

document.getElementById('startBtn').addEventListener('click', start);
home();
</script>
